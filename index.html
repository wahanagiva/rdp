<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Video Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <h1>Lyric Video<br>Generator</h1>
            <p class="subtitle">5.4M+ Kombinasi Visual Unik</p>

            <div class="control-group">
                <label>Judul Lagu</label>
                <input type="text" id="songTitle" value="Stars" placeholder="Judul lagu...">
            </div>

            <div class="control-group">
                <label>Nama Artis</label>
                <input type="text" id="artistName" value="Ayla Nereo" placeholder="Nama artis...">
            </div>

            <div class="control-group">
                <label>Lirik (satu baris per line)</label>
                <textarea id="lyricsInput" rows="8" placeholder="Masukkan lirik di sini...">We are made of stars
Dancing in the dark
Light up the sky tonight
With every beat of heart
Arrows flying high
Birds across the moon
Singing out our song
Underneath the tune
We shine like diamonds
In the velvet night
Every word we speak
Becomes a point of light
Rising from the ashes
Burning ever bright
We are made of stars
Dancing through the night
Echoes in the silence
Whispers in the wind
Every ending here
Is where we begin
Colors paint the sky
As the world turns slow
We are stardust falling
Everywhere we go</textarea>
            </div>

            <div class="control-group">
                <label>Durasi per Baris (detik)</label>
                <input type="range" id="lineDuration" min="1" max="8" step="0.5" value="3">
                <span id="lineDurationVal">3s</span>
            </div>

            <div class="control-group">
                <label>Audio (opsional)</label>
                <input type="file" id="audioFile" accept="audio/*">
            </div>

            <div class="control-group">
                <button id="randomizeSeed" class="btn btn-randomize">Randomize Styles</button>
                <span id="seedDisplay" class="seed-label"></span>
            </div>

            <div class="button-group">
                <button id="previewBtn" class="btn btn-primary">Preview</button>
                <button id="playPauseBtn" class="btn btn-secondary" disabled>Pause</button>
                <button id="recordBtn" class="btn btn-record">Rekam Video</button>
            </div>

            <div id="recordingStatus" class="recording-status hidden">
                <div class="rec-dot"></div>
                <span>Merekam...</span>
            </div>

            <div class="stats-bar">
                <span>33 efek teks &bull; 60 palet &bull; 15 font &bull; 12 background</span>
            </div>
        </aside>

        <main id="preview-area">
            <canvas id="lyricCanvas" width="1280" height="720"></canvas>
            <div id="timeline">
                <div id="timelineProgress"></div>
            </div>
        </main>
    </div>

    <script src="animations.js"></script>
    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
