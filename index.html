<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyric Video Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <h1>Lyric Video<br>Generator</h1>
            <p class="subtitle">5.4M+ Kombinasi Visual Unik</p>

            <div class="control-group">
                <label>File SRT (Subtitle)</label>
                <input type="file" id="srtFile" accept=".srt">
                <span id="srtStatus" class="srt-status"></span>
            </div>

            <div class="control-group">
                <label>Judul Lagu (opsional)</label>
                <input type="text" id="songTitle" placeholder="Nama lagu...">
            </div>

            <div class="control-group">
                <label>Artist (opsional)</label>
                <input type="text" id="artistName" placeholder="Nama artist...">
            </div>

            <div class="control-group">
                <label>Audio</label>
                <div class="audio-tabs">
                    <button id="tabFile" class="tab-btn active">File</button>
                    <button id="tabYoutube" class="tab-btn">YouTube</button>
                </div>
                <div id="audioFilePanel">
                    <input type="file" id="audioFile" accept="audio/*">
                </div>
                <div id="audioYoutubePanel" class="hidden">
                    <input type="text" id="youtubeUrl" placeholder="https://youtube.com/watch?v=...">
                    <button id="loadYtBtn" class="btn btn-small">Load</button>
                    <span id="ytStatus" class="srt-status"></span>
                </div>
            </div>

            <div class="control-group">
                <button id="randomizeSeed" class="btn btn-randomize">Randomize Styles</button>
                <span id="seedDisplay" class="seed-label"></span>
            </div>

            <div class="button-group">
                <button id="previewBtn" class="btn btn-primary" disabled>Preview</button>
                <button id="playPauseBtn" class="btn btn-secondary" disabled>Pause</button>
                <button id="recordBtn" class="btn btn-record" disabled>Rekam Video</button>
            </div>

            <div id="recordingStatus" class="recording-status hidden">
                <div class="rec-dot"></div>
                <span>Merekam...</span>
            </div>

            <div class="stats-bar">
                <span>33 efek teks &bull; 60 palet &bull; 15 font &bull; 12 background</span>
            </div>
        </aside>

        <main id="preview-area">
            <canvas id="lyricCanvas" width="1280" height="720"></canvas>
            <div id="timeline">
                <div id="timelineProgress"></div>
            </div>
        </main>
    </div>

    <div id="yt-container" style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;">
        <div id="ytPlayer"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="animations.js"></script>
    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
